<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commit Halley</title>
  <meta name="description" content="See which words you actually use in your commit messages. Type a GitHub username, get a chart.">
  <meta property="og:title" content="Commit Halley">
  <meta property="og:description" content="See which words you actually use in your commit messages">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://paintingstack.github.io/commit-halley/">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://d3js.org" crossorigin>
  <link rel="dns-prefetch" href="https://api.github.com">
  <meta property="og:image" content="https://paintingstack.github.io/commit-halley/icon-og.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://d3js.org; style-src 'self'; connect-src 'self' https://api.github.com; img-src 'self'; frame-ancestors 'self'">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title-block">
      <img src="icon-small.png" alt="" class="title-icon">
      <div>
        <h1>Commit Halley</h1>
        <p class="subtitle">See which words you actually use in your commits</p>
      </div>
    </div>
    <form id="search-form">
      <div class="form-field">
        <label for="username-input">GitHub user</label>
        <input type="text" id="username-input" placeholder="e.g. torvalds" required autocomplete="off" spellcheck="false">
      </div>
      <button type="submit" id="submit-button">See words</button>
    </form>
    <p id="status" class="status"></p>
    <div id="suggestions">
      <span class="suggestions-label">Try</span>
      <button class="suggestion" data-username="torvalds">Linus Torvalds</button>
      <button class="suggestion" data-username="dhh">DHH</button>
      <button class="suggestion" data-username="rauchg">Guillermo Rauch</button>
      <button class="suggestion" data-username="karpathy">Andrej Karpathy</button>
      <button class="suggestion" data-username="antirez">Antirez</button>
    </div>
  </header>

  <div id="content">
    <main>
      <div id="chart"></div>
    </main>

    <div id="commit-panel">
      <div id="commit-panel-header">
        <span id="commit-panel-title"></span>
        <button id="commit-panel-close">Close</button>
      </div>
      <div id="commit-panel-list"></div>
    </div>
  </div>

  <footer>
    <p class="stop-words-label">Common words removed</p>
    <p id="stop-words"></p>
    <p class="credit">Built by <a href="https://paintingstack.com" target="_blank" rel="noopener">Paintingstack</a> / <a href="https://github.com/paintingstack/commit-halley" target="_blank" rel="noopener">Source</a></p>
  </footer>

  <div id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
